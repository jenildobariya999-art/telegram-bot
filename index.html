<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Verification</title>

<style>
body{
background:#0f172a;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:#1e293b;
padding:25px;
border-radius:20px;
text-align:center;
width:320px;
}
.bar{height:6px;background:#333;margin-top:10px;border-radius:10px;}
.progress{height:100%;width:0;background:#6366f1;}
button{margin-top:20px;padding:10px;width:100%;border:none;border-radius:10px;}
</style>
</head>

<body>

<div class="card">
<h2 id="t">Scanning Device...</h2>
<p id="d">Please wait</p>

<div class="bar"><div id="p" class="progress"></div></div>

<button id="btn" style="display:none;"></button>
</div>

<script>
let pr=0;
let bar=document.getElementById("p");

let i=setInterval(()=>{
pr+=10;
bar.style.width=pr+"%";

if(pr==50){
document.getElementById("t").innerHTML="Verifying Device...";
}

if(pr>=100){
clearInterval(i);
verify();
}
},300);

function uid(){
return new URL(location.href).searchParams.get("uid");
}

// 🔥 STRONG FINGERPRINT
function fingerprint(){
return btoa(
navigator.userAgent +
navigator.platform +
navigator.language +
screen.width + screen.height +
new Date().getTimezoneOffset()
);
}

function verify(){
fetch("/verify",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_id:uid(),
device:fingerprint()
})
})
.then(r=>r.json())
.then(d=>{
let btn=document.getElementById("btn");
btn.style.display="block";

if(d.status=="success"){
document.getElementById("t").innerHTML="✅ Verified";
btn.innerHTML="CONTINUE TO BOT";
}
else{
document.getElementById("t").innerHTML="❌ Failed";
btn.innerHTML="TRY AGAIN";
}

btn.onclick=()=>window.location="https://t.me/YOUR_BOT";
})
}
</script>

</body>
</html>
