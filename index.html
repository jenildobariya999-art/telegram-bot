<!DOCTYPE html>
<html>
<head>
  <title>Verification</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="container">
  <h3 id="name">User</h3>
  <span id="status" class="badge scanning">SCANNING</span>

  <div id="scanBox">
    <div class="circle"></div>
    <h2>Verifying Device</h2>

    <div class="progress">
      <div id="bar"></div>
    </div>

    <p id="percent">0%</p>
  </div>

  <div id="resultBox" class="hidden">
    <h1 id="icon"></h1>
    <h2 id="title"></h2>
    <p id="desc"></p>
    <button onclick="closeApp()">Continue</button>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
